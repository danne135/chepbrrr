<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動統計儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); min-height: 100vh; margin: 0; padding: 40px 20px; color: #333; }
  .header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; }
  .logo-circle { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; background: #fff; border: 3px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
  h1 { margin: 0; color: #333; font-size: 32px; font-weight: 700; letter-spacing: 0.5px; }
  .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
  .stats-card { text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 16px; margin-bottom: 40px; box-shadow: 0 10px 20px rgba(118,75,162,0.2); }
  .stats-card h3 { margin: 0 0 10px 0; font-size: 20px; font-weight: 600; opacity: 0.9; }
  .stats-card .number { font-size: 48px; font-weight: 700; letter-spacing: 2px; }
  .chart-container { position: relative; width: 100%; }
</style>
</head>
<body>
<div class="header">
  <div class="logo-circle">
    <img src="logo.png" alt="Logo">
  </div>
  <h1>活動統計儀表板</h1>
</div>
<div class="container">
  <div class="stats-card">
    <h3>目前總報名人數</h3>
    <div class="number" id="total">--</div>
  </div>
  <div class="chart-container">
    <canvas id="c"></canvas>
  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyMEvwl4MX_Md9tgka39Nz7BOVWcWeG4faEERtI06r15uTHd5z1QFfdSyuQIC8FKZ8Y/exec?action=getData";

async function load(){
 try {
  let r=await fetch(API_URL);
  let d=await r.json();
  document.getElementById("total").innerText=d.length;

  let m={};
  d.forEach(x=>{
   let date=new Date(x.time).toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
   m[date]=(m[date]||0)+1;
  });

  new Chart(document.getElementById("c"), {
    type: "bar",
    data: {
      labels: Object.keys(m),
      datasets: [{
        label: "每日報名人數",
        data: Object.values(m),
        backgroundColor: "rgba(102, 126, 234, 0.7)",
        borderColor: "rgba(102, 126, 234, 1)",
        borderWidth: 2,
        borderRadius: 6,
        hoverBackgroundColor: "rgba(118, 75, 162, 0.8)"
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 }, grid: { borderDash: [5, 5] } },
        x: { grid: { display: false } }
      }
    }
  });
 } catch(e) {
  document.getElementById("total").innerText="載入失敗";
 }
}
load();
</script>
</body>
</html>
