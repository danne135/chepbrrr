<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動報名</title>
<style>
body {font-family: Arial; background:#eef; padding:20px;}
.container {max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
input,button{width:100%;padding:10px;margin:8px 0;}
</style>
</head>
<body>
<div class="container">
<h2>活動報名</h2>
<input id="name" placeholder="姓名">
<input id="phone" placeholder="手機">
<input id="serial" placeholder="序號">
<input type="file" id="file">
<button onclick="submitForm()">送出</button>
<p id="msg"></p>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxoBQNeaTzbi8NDyHrbu2YN9pPwhjOYsyOafHt1cqZK_B2b2ArcvWezdH9y0oRoymnW/exec";

function submitForm(){
  let f=new FormData();
  f.append("name",name.value);
  f.append("phone",phone.value);
  f.append("serial",serial.value);
  if(file.files[0]) f.append("file",file.files[0]);

  fetch(API_URL,{method:"POST",body:f})
  .then(r=>r.text())
  .then(t=>msg.innerText=t);
}
</script>
</body>
</html>
