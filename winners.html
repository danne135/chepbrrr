<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>中獎名單</title></head>
<body>
<h2>中獎名單</h2>
<ul id="list"></ul>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxoBQNeaTzbi8NDyHrbu2YN9pPwhjOYsyOafHt1cqZK_B2b2ArcvWezdH9y0oRoymnW/exec?action=getData";

fetch(API_URL)
.then(r=>r.json())
.then(d=>{
 d.slice(0,10).forEach(x=>{
  let li=document.createElement("li");
  li.innerText=x.name+" / "+x.phone;
  list.appendChild(li);
 });
});
</script>
</body>
</html>
