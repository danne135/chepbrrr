<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸運大抽獎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #2b1055 0%, #110624 100%); color: #fff; text-align: center; padding: 40px 20px; margin: 0; min-height: 100vh; }
  .header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
  .logo-circle { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; background: #fff; border: 4px solid #f39c12; box-shadow: 0 0 20px rgba(243,156,18,0.5); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
  h1 { margin: 0; font-size: 36px; font-weight: 800; background: linear-gradient(to right, #f6d365 0%, #fda085 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 5px 15px rgba(253,160,133,0.3); }
  .container { max-width: 900px; margin: 0 auto; }
  
  .controls { margin-bottom: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
  select, button { padding: 14px 24px; font-size: 18px; border-radius: 12px; border: none; outline: none; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); font-weight: 600; }
  select { background: rgba(255,255,255,0.1); color: #f6d365; border: 2px solid rgba(246,211,101,0.5); backdrop-filter: blur(10px); cursor: pointer; }
  select option { background: #2b1055; color: #fff; }
  button { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #4a2810; cursor: pointer; box-shadow: 0 5px 15px rgba(253,160,133,0.4); }
  button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(253,160,133,0.6); }
  button:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }

  .draw-box { background: rgba(0,0,0,0.4); border: 4px solid rgba(246,211,101,0.6); border-radius: 24px; padding: 50px 30px; margin-bottom: 40px; height: 300px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(246,211,101,0.2); backdrop-filter: blur(5px); }
  .rolling-text { font-size: 52px; font-weight: 800; color: #fff; letter-spacing: 3px; text-shadow: 0 0 20px rgba(255,255,255,0.6); }
  .winner-display { display: none; flex-direction: column; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .winner-display .winner-title { font-size: 20px; color: #f6d365; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 5px; }
  .winner-display #winnerName { font-size: 64px; font-weight: 800; color: #00ffca; text-shadow: 0 0 30px rgba(0,255,202,0.6); margin: 10px 0; }
  .winner-display #winnerSerial { font-size: 28px; color: #e0e0e0; font-weight: 400; background: rgba(255,255,255,0.1); padding: 5px 20px; border-radius: 20px; display: inline-block; margin-top: 10px; }

  .winners-list { text-align: left; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
  .winners-list h3 { margin-top: 0; color: #fff; font-size: 24px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; display: flex; align-items: center; gap: 10px; }
  .prize-group { margin-bottom: 25px; }
  .prize-group h4 { color: #f6d365; margin: 10px 0; font-size: 20px; display: inline-block; padding: 5px 15px; background: rgba(246,211,101,0.1); border-radius: 8px; }
  .prize-group p { margin: 8px 0 8px 15px; font-size: 18px; color: #eee; border-left: 2px solid rgba(255,255,255,0.2); padding-left: 15px; }
  
  .reset-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #aaa; font-size: 14px; padding: 8px 15px; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; }
  .reset-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: none; box-shadow: none; border-color: #fff; }

  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-circle">
    <img src="logo.png" alt="Logo">
  </div>
  <h1>幸運大抽獎</h1>
</div>

<div class="container">
  <div class="controls">
    <select id="prizeSelect">
      <option value="頭獎" data-count="1">頭獎 (共 1 名)</option>
      <option value="二獎" data-count="3">二獎 (共 3 名)</option>
      <option value="三獎" data-count="5">三獎 (共 5 名)</option>
      <option value="四獎" data-count="10">四獎 (共 10 名)</option>
      <option value="五獎" data-count="20">五獎 (共 20 名)</option>
    </select>
    <button id="drawBtn" onclick="startDraw()" disabled>載入名單中...</button>
  </div>

  <div class="draw-box">
    <div id="rollingText" class="rolling-text">準備抽獎</div>
    <div id="winnerDisplay" class="winner-display">
      <div class="winner-title">Winner</div>
      <div id="winnerName"></div>
      <div><span id="winnerSerial"></span></div>
    </div>
  </div>

  <div class="winners-list" id="winnersList">
    <h3>🏆 中獎名單</h3>
    <div id="winnersContent"></div>
  </div>
  
  <button class="reset-btn" onclick="resetWinners()">重置所有紀錄</button>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(freq, type, duration) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

const API_URL="https://script.google.com/macros/s/AKfycbw7uusBwAwO9P8B0MPaMwpYdXWDDKAoqtVrXdZMEVbBLctyUdMUnmuPmTh99U59D6bN/exec?action=getData";
let allData = [];
let availableData = [];
let winners = JSON.parse(localStorage.getItem('drawWinners')) || {
  "頭獎": [], "二獎": [], "三獎": [], "四獎": [], "五獎": []
};
let isDrawing = false;

async function load(){
  try {
    let r=await fetch(API_URL);
    allData=await r.json();
    
    let drawnSerials = [];
    Object.values(winners).forEach(arr => {
      arr.forEach(w => drawnSerials.push(w.serial));
    });
    
    availableData = allData.filter(d => !drawnSerials.includes(d.serial));
    
    document.getElementById("drawBtn").disabled = false;
    document.getElementById("drawBtn").innerText = "開始抽獎";
    renderWinners();
  } catch(e) {
    document.getElementById("drawBtn").innerText = "名單載入失敗";
    document.getElementById("rollingText").innerText = "查無資料";
  }
}

function renderWinners() {
  let html = "";
  const prizeOrder = ["頭獎", "二獎", "三獎", "四獎", "五獎"];
  prizeOrder.forEach(prize => {
    if(winners[prize] && winners[prize].length > 0) {
      html += `<div class="prize-group"><h4>${prize}</h4>`;
      winners[prize].forEach((w, idx) => {
        html += `<p>${idx+1}. <strong style="color:#fff;">${w.name}</strong> (序號: ${w.serial})</p>`;
      });
      html += `</div>`;
    }
  });
  if(html === "") html = "<p style='color:#888;'>尚未開出任何獎項</p>";
  document.getElementById("winnersContent").innerHTML = html;
}

function maskNameString(nameStr) {
  if (!nameStr) return "";
  if (nameStr.length <= 2) return nameStr.charAt(0) + "○";
  return nameStr.charAt(0) + "○" + nameStr.slice(2);
}

function startDraw() {
  if(isDrawing) return;
  const prizeSelect = document.getElementById("prizeSelect");
  const currentPrize = prizeSelect.value;
  const maxCount = parseInt(prizeSelect.options[prizeSelect.selectedIndex].getAttribute("data-count"));
  
  if (winners[currentPrize].length >= maxCount) {
    alert(`${currentPrize} 的名額 (${maxCount} 名) 已滿！`);
    return;
  }
  
  if (availableData.length === 0) {
    alert("候選名單為空！");
    return;
  }

  if (audioCtx.state === 'suspended') audioCtx.resume();

  isDrawing = true;
  document.getElementById("drawBtn").disabled = true;
  document.getElementById("winnerDisplay").style.display = "none";
  document.getElementById("rollingText").style.display = "block";
  
  let rollTime = 5000; 
  let intervalTime = 50; 
  let elapsed = 0;
  
  let rollInterval = setInterval(() => {
    let rand = Math.floor(Math.random() * availableData.length);
    let tmpPerson = availableData[rand];
    
    let maskName = maskNameString(tmpPerson.name);
    document.getElementById("rollingText").innerText = tmpPerson.serial + " - " + maskName;
    
    if(elapsed % 150 === 0) playBeep(600 + (Math.random()*300), 'sine', 0.1); 

    elapsed += intervalTime;
    if (elapsed >= rollTime) {
      clearInterval(rollInterval);
      finishDraw(currentPrize);
    }
  }, intervalTime);
}

function finishDraw(prizeName) {
  let rand = Math.floor(Math.random() * availableData.length);
  let winner = availableData[rand];
  
  availableData.splice(rand, 1);
  winners[prizeName].push(winner);
  localStorage.setItem('drawWinners', JSON.stringify(winners));
  
  document.getElementById("rollingText").style.display = "none";
  let wd = document.getElementById("winnerDisplay");
  wd.style.display = "flex";
  document.getElementById("winnerName").innerText = winner.name;
  document.getElementById("winnerSerial").innerText = "序號: " + winner.serial;
  
  playBeep(880, 'square', 0.15);
  setTimeout(()=> playBeep(1108, 'square', 0.15), 150);
  setTimeout(()=> playBeep(1318, 'square', 0.6), 300);

  renderWinners();
  
  document.getElementById("drawBtn").disabled = false;
  isDrawing = false;
}

function resetWinners() {
  if(confirm("確定重置中獎名單？")) {
    localStorage.removeItem("drawWinners");
    winners = { "頭獎": [], "二獎": [], "三獎": [], "四獎": [], "五獎": [] };
    availableData = [...allData];
    
    document.getElementById("winnerDisplay").style.display = "none";
    document.getElementById("rollingText").style.display = "block";
    document.getElementById("rollingText").innerText = "資料已重置";
    renderWinners();
  }
}

load();
</script>
</body>
</html>
