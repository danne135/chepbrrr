<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>抽獎轉盤</title>
<style>
body{text-align:center;background:#222;color:#fff;}
#wheel{width:300px;height:300px;border-radius:50%;border:10px solid #fff;margin:30px auto;position:relative;}
button{padding:10px 20px;}
</style>
</head>
<body>
<h1>抽獎轉盤</h1>
<div id="wheel"></div>
<button onclick="spin()">開始</button>
<p id="winner"></p>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxoBQNeaTzbi8NDyHrbu2YN9pPwhjOYsyOafHt1cqZK_B2b2ArcvWezdH9y0oRoymnW/exec?action=getData";
let data=[];

async function load(){
 let r=await fetch(API_URL);
 data=await r.json();
}
load();

function spin(){
 let i=0;
 let t=setInterval(()=>{
   let r=Math.floor(Math.random()*data.length);
   winner.innerText=data[r].name;
   i++;
   if(i>30) clearInterval(t);
 },100);
}
</script>
</body>
</html>
